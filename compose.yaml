services:
  db:
    image: postgres:17-bookworm
    container_name: ecommerce-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-db}
      POSTGRES_USER: ${DATABASE_USER:-admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-admin} -d ${DATABASE_NAME:-db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-test:
    image: postgres:17-bookworm
    container_name: ecommerce-db-test
    restart: unless-stopped
    profiles:
      - test
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-db}
      POSTGRES_USER: ${DATABASE_USER:-admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-admin} -d ${DATABASE_NAME:-db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: