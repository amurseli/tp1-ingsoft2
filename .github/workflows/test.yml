name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build containers
        run: make build

      - name: Start services
        run: make up

      - name: Wait for services
        run: sleep 10

      - name: Run tests
        run: make test

      - name: Stop services
        run: make down